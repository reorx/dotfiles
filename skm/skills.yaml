packages:
  - local_path: ~/Code/scripts
  - local_path: ~/Code/devblocks
    agents:
      includes:
        - claude
        - codex
  - repo: https://github.com/getpaseo/paseo
    clone_strategy: shallow
    agents:
      includes:
        - claude
        - codex
  - repo: https://github.com/firecrawl/cli
    skills:
      # all-in-one skill
      # - firecrawl
      - firecrawl-scrape
      - firecrawl-search
  - repo: https://github.com/vercel-labs/agent-skills
    skills:
      - vercel-react-best-practices
      - web-design-guidelines
    agents:
      excludes:
        - openclaw
  - repo: https://github.com/pbakaus/impeccable
